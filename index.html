<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 My Todo App</h1>
            <p class="subtitle">Organize your tasks efficiently</p>
        </header>

        <div class="input-section">
            <form id="todoForm">
                <input 
                    id="todoInput" 
                    type="text" 
                    placeholder="Add a new task... (press Enter or click Add)"
                    autocomplete="off"
                >
                <button type="submit" class="btn-add">Add Todo</button>
            </form>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
            <button class="clear-btn">Clear Completed</button>
        </div>

        <div class="stats">
            <span id="itemCount">0 items left</span>
        </div>

        <ul id="todoList" class="todo-list"></ul>

        <footer>
            <p>Double-click to edit • Single click to toggle complete</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
